name: dog_gromming_website
description: Dog grooming website for Mimos

publish_to: 'none'

version: 1.4.3+7

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  dio: ^5.9.2
  easy_localization: ^3.0.8
  either_dart: ^1.0.0
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  flutter_svg: ^2.2.4
  flutter_web_plugins:
    sdk: flutter
  flutter_widget_from_html: ^0.17.2
  get_it: ^9.2.1
  go_router: ^17.2.2
  injectable: ^3.0.0
  url_launcher: ^6.3.2
  web: ^1.1.1

dev_dependencies:
  build_runner: ^2.14.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  injectable_generator: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/images/
    - assets/licenses/
    - assets/html/
    - assets/icons/

  fonts:
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka-Medium.ttf
          weight: 500
        - asset: assets/fonts/Fredoka-SemiBold.ttf
          weight: 600
    - family: Comfortaa
      fonts:
        - asset: assets/fonts/Comfortaa-Regular.ttf
          weight: 400
        - asset: assets/fonts/Comfortaa-SemiBold.ttf
          weight: 600
